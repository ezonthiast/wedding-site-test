<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lorezon & Angelica | Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#b89b5e;
  --green:#2e7d32;
  --soft:#e8f5e9;
  --text:#2a2a2a;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Montserrat',sans-serif;
  background:var(--soft);
  color:var(--text);
  overflow-x:hidden;
}

.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
  background:url('https://images.unsplash.com/photo-1523438097201-512ae7d59c5b?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
}

.hero::after{
  content:'';
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.45);
}

.hero-content{
  position:relative;
  z-index:1;
  color:white;
  opacity:0;
  transform:translateY(20px);
  animation:fadeIn 2s ease forwards;
}

.hero h1{
  font-family:'Great Vibes','Sloop Script',cursive;
  font-size:4.2rem;
  letter-spacing:1px;
}

.hero p{margin-top:10px;}

.hero small{display:block;margin-top:20px;opacity:0.85;}

.section{
  min-height:70vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:90px 20px;
  opacity:0;
  transform:translateY(40px);
  transition:all 1.2s ease;
}

.section.visible{
  opacity:1;
  transform:translateY(0);
}

.section-inner{max-width:800px;}

h2{
  font-family:'Playfair Display',serif;
  font-size:2.4rem;
  color:var(--green);
  margin-bottom:20px;
}

.divider{
  width:60px;
  height:2px;
  background:var(--gold);
  margin:20px auto;
}

.details{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;}
.detail-box{background:white;padding:25px;border-radius:15px;min-width:220px;box-shadow:0 10px 25px rgba(0,0,0,0.05);}

iframe.map{width:100%;height:280px;border:0;border-radius:15px;margin-top:25px;}

input,textarea{width:100%;padding:14px;margin:10px 0;border-radius:10px;border:1px solid #ddd;}

button{width:100%;padding:14px;border:none;border-radius:10px;background:var(--green);color:white;cursor:pointer;}

.music{
  position:fixed;
  bottom:20px;
  right:20px;
  background:var(--green);
  color:white;
  padding:12px 16px;
  border-radius:50px;
  cursor:pointer;
  z-index:10;
}

#ytplayer{
  position:fixed;
  width:1px;
  height:1px;
  opacity:0;
  pointer-events:none;
}

@keyframes fadeIn{to{opacity:1;transform:translateY(0);}}
</style>
</head>

<body>

<iframe id="ytplayer"
src="https://www.youtube.com/embed/Q6CROi8SK88?autoplay=1&loop=1&playlist=Q6CROi8SK88&controls=0&mute=1&start=70"
allow="autoplay">
</iframe>

<div class="music" onclick="toggleMusic()">🎵</div>

<div class="hero">
  <div class="hero-content">
    <h1>Lorezon & Angelica</h1>
    <p>Together since 2015</p>
    <small>January 3, 2027 • Sodretos Royale, Marikina</small>
  </div>
</div>

<div class="section"><div class="section-inner">
<h2>Our Story</h2>
<div class="divider"></div>
<p>We met in college in 2015. What started as friendship became love that lasted through every season of life.</p>
</div></div>

<div class="section"><div class="section-inner">
<h2>Wedding Details</h2>
<div class="divider"></div>
<div class="details">
<div class="detail-box"><strong>Date</strong><br>Jan 3, 2027</div>
<div class="detail-box"><strong>Venue</strong><br>Sodretos Royale</div>
</div>
<iframe class="map" src="https://www.google.com/maps?q=Sodretos+Royale+Marikina&output=embed"></iframe>
</div></div>

<div class="section"><div class="section-inner">
<h2>RSVP</h2>
<div class="divider"></div>
<form>
<input placeholder="Full Name" required>
<input placeholder="Guests" type="number" required>
<textarea placeholder="Message"></textarea>
<button type="submit">Send RSVP</button>
</form>
</div></div>

<script>
const sections=document.querySelectorAll('.section');
const observer=new IntersectionObserver(e=>{
  e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('visible')});
},{threshold:0.2});
sections.forEach(s=>observer.observe(s));

function toggleMusic(){
  const iframe=document.getElementById('ytplayer');
  iframe.src.includes('mute=1')
    ? iframe.src=iframe.src.replace('mute=1','mute=0')
    : iframe.src=iframe.src.replace('mute=0','mute=1');
}
</script>

</body>
</html>
